<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Voz PR — Test</title>
<style>
body { background: #06080F; color: #F1F5F9; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
#orb { width: 120px; height: 120px; border-radius: 50%; border: 2px solid #2E7CF6; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer; margin: 1rem; }
#status { color: #94A3B8; margin: 0.5rem; min-height: 1.5em; }
#log { color: #666; font-size: 0.75rem; max-width: 500px; max-height: 200px; overflow-y: auto; text-align: left; white-space: pre-wrap; }
</style>
</head>
<body>
<h2>Bori Test</h2>
<div id="orb" onclick="startSession()">🎙️</div>
<div id="status">Tap to test</div>
<div id="log"></div>

<script>
const TOKEN_URL = 'https://lavozpr-worker.hooporiapr.workers.dev/token';
const DG_WS = 'wss://agent.deepgram.com/v1/agent/converse';

let ws, audioCtx, micStream, processor;

function log(msg) {
    const el = document.getElementById('log');
    el.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n';
    el.scrollTop = el.scrollHeight;
    console.log(msg);
}

async function startSession() {
    document.getElementById('status').textContent = 'Connecting...';
    document.getElementById('log').textContent = '';
    
    try {
        log('Fetching token...');
        const res = await fetch(TOKEN_URL);
        const data = await res.json();
        log('Token received: ' + (data.token ? 'yes' : 'no'));
        
        if (!data.token) { log('ERROR: No token'); return; }

        audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
        log('AudioContext created');

        log('Connecting WebSocket with bearer auth...');
        ws = new WebSocket(DG_WS, ['bearer', data.token]);
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => {
            log('WebSocket OPEN - sending settings...');
            
            const settings = {
                type: 'Settings',
                audio: {
                    input: { encoding: 'linear16', sample_rate: 16000 },
                    output: { encoding: 'linear16', sample_rate: 24000, container: 'none' }
                },
                agent: {
                    listen: {
                        provider: { type: 'deepgram', model: 'nova-3', language: 'multi' }
                    },
                    think: {
                        provider: { type: 'open_ai', model: 'gpt-4o-mini' },
                        prompt: 'You are Bori, a friendly bilingual guide to Puerto Rico. Keep responses short (1-2 sentences).'
                    },
                    speak: {
                        provider: { type: 'deepgram', model: 'aura-2-asteria-en' }
                    },
                    greeting: 'Hey! I am Bori. Ask me anything about Puerto Rico!'
                }
            };
            
            ws.send(JSON.stringify(settings));
            log('Settings sent (OpenAI + Deepgram TTS)');
            document.getElementById('status').textContent = 'Connected! Starting mic...';
            startMic();
        };

        ws.onmessage = (e) => {
            if (e.data instanceof ArrayBuffer) {
                playAudio(e.data);
            } else {
                const msg = JSON.parse(e.data);
                log('MSG: ' + msg.type + (msg.content ? ' - ' + msg.content.substring(0,50) : '') + (msg.description ? ' - ' + msg.description : ''));
                
                if (msg.type === 'SettingsApplied') {
                    document.getElementById('status').textContent = 'Bori is listening!';
                    document.getElementById('orb').style.borderColor = '#22D3EE';
                }
                if (msg.type === 'AgentStartedSpeaking') {
                    document.getElementById('status').textContent = 'Bori speaking...';
                    document.getElementById('orb').style.borderColor = '#A78BFA';
                }
                if (msg.type === 'AgentStoppedSpeaking') {
                    document.getElementById('status').textContent = 'Bori is listening...';
                    document.getElementById('orb').style.borderColor = '#22D3EE';
                }
                if (msg.type === 'Error') {
                    document.getElementById('status').textContent = 'ERROR: ' + msg.description;
                    document.getElementById('orb').style.borderColor = '#ef4444';
                }
            }
        };

        ws.onerror = (err) => {
            log('WebSocket ERROR');
            document.getElementById('status').textContent = 'WebSocket error';
        };

        ws.onclose = (e) => {
            log('WebSocket CLOSED code=' + e.code + ' reason=' + e.reason + ' clean=' + e.wasClean);
            document.getElementById('status').textContent = 'Closed (code ' + e.code + ') - tap to retry';
            document.getElementById('orb').style.borderColor = '#2E7CF6';
        };

    } catch (err) {
        log('ERROR: ' + err.message);
        document.getElementById('status').textContent = 'Error: ' + err.message;
    }
}

async function startMic() {
    try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000 } });
        const micCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        const source = micCtx.createMediaStreamSource(micStream);
        processor = micCtx.createScriptProcessor(4096, 1, 1);
        processor.onaudioprocess = (e) => {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            const f32 = e.inputBuffer.getChannelData(0);
            const i16 = new Int16Array(f32.length);
            for (let i = 0; i < f32.length; i++) {
                const s = Math.max(-1, Math.min(1, f32[i]));
                i16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            ws.send(i16.buffer);
        };
        source.connect(processor);
        processor.connect(micCtx.destination);
        log('Mic started');
    } catch (err) {
        log('Mic ERROR: ' + err.message);
    }
}

let scheduledTime = 0;
function playAudio(buf) {
    if (!audioCtx) return;
    const i16 = new Int16Array(buf);
    const f32 = new Float32Array(i16.length);
    for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;
    const ab = audioCtx.createBuffer(1, f32.length, 24000);
    ab.getChannelData(0).set(f32);
    const src = audioCtx.createBufferSource();
    src.buffer = ab;
    src.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    const start = Math.max(now, scheduledTime);
    src.start(start);
    scheduledTime = start + ab.duration;
}
</script>
</body>
</html>
