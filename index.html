<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Voz PR — The Voice of Puerto Rico</title>
<meta name="description" content="Meet Bori — your bilingual AI voice guide to Puerto Rico. 78 pueblos. One Voice.">
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&display=swap" rel="stylesheet">
<style>
:root{--deep:#06080F;--blue:#2E7CF6;--red:#E53E3E;--blue-bright:#5B9BFF;--red-bright:#FC8181;--white:#F1F5F9;--muted:#94A3B8;--cyan:#22D3EE}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--deep);color:var(--white);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4rem 2rem 2rem}
.cosmic-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(46,124,246,.08),transparent),radial-gradient(ellipse 60% 50% at 80% 30%,rgba(229,62,62,.06),transparent),radial-gradient(ellipse 70% 40% at 50% 90%,rgba(46,124,246,.05),transparent)}
.topnav{position:fixed;top:0;left:0;right:0;padding:.4rem 1rem;text-align:center;font-size:.65rem;color:#F1F5F9;background:rgba(6,8,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(46,124,246,.15);z-index:100}
.topnav-links{margin-top:.2rem}
.topnav a{color:var(--blue-bright);text-decoration:none;margin:0 .5rem}
.topnav a:hover{color:var(--white)}
.content{position:relative;z-index:1;max-width:600px;display:flex;flex-direction:column;align-items:center;gap:.5rem}
.bori-icon{width:200px;height:auto;margin-bottom:.5rem}
h1{font-family:'Fraunces',serif;font-size:clamp(2.2rem,7vw,4rem);font-weight:900;line-height:1.1}
.gradient-text{background:linear-gradient(135deg,var(--blue),var(--red),var(--blue-bright));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:1.1rem;color:var(--white);margin-top:.5rem}
.voice-buttons{display:flex;gap:1rem;margin-top:1.5rem;flex-wrap:wrap;justify-content:center}
.voice-btn{padding:.9rem 2rem;border-radius:50px;border:2px solid;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:transform .3s,box-shadow .3s;display:flex;align-items:center;gap:.5rem;min-width:180px;justify-content:center;background:transparent}
.voice-btn:hover{transform:translateY(-2px)}
.voice-btn.en{border-color:var(--blue);color:var(--blue-bright)}
.voice-btn.en:hover{background:rgba(46,124,246,.1);box-shadow:0 4px 20px rgba(46,124,246,.3)}
.voice-btn.es{border-color:var(--red);color:var(--red-bright)}
.voice-btn.es:hover{background:rgba(229,62,62,.1);box-shadow:0 4px 20px rgba(229,62,62,.3)}
.voice-btn.active-en{background:var(--blue)!important;color:white!important;border-color:var(--blue)!important;animation:pulse-blue 2s ease-in-out infinite}
.voice-btn.active-es{background:var(--red)!important;color:white!important;border-color:var(--red)!important;animation:pulse-red 2s ease-in-out infinite}
.voice-btn.connecting{opacity:.7}
@keyframes pulse-blue{0%,100%{box-shadow:0 0 15px rgba(46,124,246,.3)}50%{box-shadow:0 0 30px rgba(46,124,246,.6)}}
@keyframes pulse-red{0%,100%{box-shadow:0 0 15px rgba(229,62,62,.3)}50%{box-shadow:0 0 30px rgba(229,62,62,.6)}}
.status{font-size:.85rem;color:var(--muted);min-height:1.2em;margin-top:.75rem;transition:color .3s}
.status.listening{color:var(--cyan)}
.status.speaking{color:var(--blue-bright)}
@media(max-width:640px){.bori-icon{width:160px}.voice-btn{min-width:150px;padding:.75rem 1.5rem;font-size:.9rem}}
@media(orientation:landscape) and (max-height:500px){.bori-icon{display:none}.content{gap:.25rem}h1{font-size:1.8rem}.voice-buttons{margin-top:.75rem}}
</style>
</head>
<body>
<div class="topnav"><div>GoStar Digital LLC</div><div class="topnav-links"><a href="partners.html">Partners</a> &nbsp;|&nbsp; <a href="privacy.html">Privacy</a> &nbsp;|&nbsp; <a href="terms.html">Terms</a></div></div>

<div class="cosmic-bg"></div>
<div class="content">
    <img src="icon.png" alt="Bori — La Voz PR" class="bori-icon">
    <h1>The <span class="gradient-text">Voice</span> of Puerto Rico</h1>
    <p class="subtitle">78 pueblos. One Voice.</p>

    <div class="voice-buttons">
        <button class="voice-btn en" id="btnEN" onclick="toggleCall('en')">🎙️ Hey Bori</button>
        <button class="voice-btn es" id="btnES" onclick="toggleCall('es')">🎙️ Oye Bori</button>
    </div>

    <p class="status" id="status"></p>
</div>

<script type="module">
import Vapi from 'https://unpkg.com/@vapi-ai/web@latest/dist/vapi.js';

var PUBLIC_KEY = "2fbc9421-0d38-48e1-97cd-b2c25b072189";
var ASSISTANTS = {
    en: "948cba76-29e3-4d6d-8219-d0ad88bd8895",
    es: "655f4d68-8e45-4039-bfa7-f8f8a5fc3ac2"
};

var vapi = null;
var activeCall = null;
var btnEN = document.getElementById('btnEN');
var btnES = document.getElementById('btnES');
var statusEl = document.getElementById('status');

window.toggleCall = function(lang) {
    if (activeCall) {
        endCall();
        return;
    }
    startCall(lang);
};

function startCall(lang) {
    var btn = lang === 'en' ? btnEN : btnES;
    var otherBtn = lang === 'en' ? btnES : btnEN;

    btn.classList.add('connecting');
    btn.innerHTML = '⏳ ' + (lang === 'en' ? 'Connecting...' : 'Conectando...');
    otherBtn.style.display = 'none';
    statusEl.textContent = '';

    vapi = new Vapi(PUBLIC_KEY);

    vapi.on('call-start', function() {
        activeCall = lang;
        btn.classList.remove('connecting');
        btn.classList.add(lang === 'en' ? 'active-en' : 'active-es');
        btn.innerHTML = lang === 'en' ? '🗣️ Tap to End' : '🗣️ Toca para Terminar';
        statusEl.textContent = lang === 'en' ? 'Bori is listening...' : 'Bori te escucha...';
        statusEl.className = 'status listening';
    });

    vapi.on('speech-start', function() {
        statusEl.textContent = lang === 'en' ? 'Bori is speaking...' : 'Bori está hablando...';
        statusEl.className = 'status speaking';
    });

    vapi.on('speech-end', function() {
        statusEl.textContent = lang === 'en' ? 'Bori is listening...' : 'Bori te escucha...';
        statusEl.className = 'status listening';
    });

    vapi.on('call-end', function() {
        resetButtons();
    });

    vapi.on('error', function(err) {
        console.error('[Bori] Error:', err);
        statusEl.textContent = 'Connection error — try again';
        statusEl.className = 'status';
        resetButtons();
    });

    vapi.start(ASSISTANTS[lang]);
}

function endCall() {
    if (vapi) {
        vapi.stop();
    }
    resetButtons();
}

function resetButtons() {
    activeCall = null;
    btnEN.className = 'voice-btn en';
    btnEN.innerHTML = '🎙️ Hey Bori';
    btnEN.style.display = '';
    btnES.className = 'voice-btn es';
    btnES.innerHTML = '🎙️ Oye Bori';
    btnES.style.display = '';
    statusEl.textContent = '';
    statusEl.className = 'status';
    vapi = null;
}
</script>
</body>
</html>
