<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Voz PR — The Voice of Puerto Rico</title>
<meta name="description" content="Meet Bori — your bilingual AI voice guide to Puerto Rico. Culture, food, music, beaches, 78 pueblos.">
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&display=swap" rel="stylesheet">
<style>
:root{--deep:#06080F;--blue:#2E7CF6;--red:#E53E3E;--blue-bright:#5B9BFF;--purple:#8B5CF6;--purple-bright:#A78BFA;--cyan:#22D3EE;--white:#F1F5F9;--muted:#94A3B8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--deep);color:var(--white);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
.cosmic-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(46,124,246,.08),transparent),radial-gradient(ellipse 60% 50% at 80% 30%,rgba(229,62,62,.06),transparent),radial-gradient(ellipse 70% 40% at 50% 90%,rgba(46,124,246,.05),transparent)}
.content{position:relative;z-index:1;max-width:600px;display:flex;flex-direction:column;align-items:center;gap:.5rem}
.bori-icon{width:200px;height:auto;margin-bottom:.5rem}
h1{font-family:'Fraunces',serif;font-size:clamp(2.2rem,7vw,4rem);font-weight:900;line-height:1.1}
.gradient-text{background:linear-gradient(135deg,var(--blue),var(--red),var(--blue-bright));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tagline{font-size:1.05rem;color:var(--white);max-width:480px;line-height:1.7;margin-top:.5rem}
.tagline em{font-style:normal}
.tagline .blue{color:var(--blue-bright)}
.tagline .red{color:var(--red)}
.footer{position:fixed;bottom:0;left:0;right:0;padding:1rem;text-align:center;font-size:.7rem;color:rgba(148,163,184,.35);background:linear-gradient(to top,var(--deep),transparent);z-index:1}
@media(max-width:640px){.bori-icon{width:160px}}
</style>
</head>
<body>
<div class="cosmic-bg"></div>
<div class="content">
    <img src="icon.png" alt="Bori — La Voz PR" class="bori-icon">
    <h1>The <span class="gradient-text">Voice</span> of Puerto Rico</h1>
    <p class="tagline">La isla real — not the postcard version.<br>78 pueblos, every flavor, every story.<br>In <span class="blue">English</span>, en <span class="red">Español</span>, <em>or both</em>.<br><span class="red">Conversando.</span> <span class="blue">In Conversation.</span></p>
</div>

<script>
var vapiInstance = null;
var assistant = "655f4d68-8e45-4039-bfa7-f8f8a5fc3ac2";
var apiKey = "PASTE_KEY_HERE";
var buttonConfig = {
    position: "bottom",
    offset: "40px",
    width: "60px",
    height: "60px",
    idle: {
        color: "rgb(46, 124, 246)",
        type: "pill",
        title: "Hey Bori",
        subtitle: "Tap to talk",
        icon: "https://unpkg.com/lucide-static@0.321.0/icons/mic.svg"
    },
    loading: {
        color: "rgb(139, 92, 246)",
        type: "pill",
        title: "Connecting...",
        subtitle: "One moment",
        icon: "https://unpkg.com/lucide-static@0.321.0/icons/loader-2.svg"
    },
    active: {
        color: "rgb(34, 211, 238)",
        type: "pill",
        title: "Bori is listening",
        subtitle: "Tap to end",
        icon: "https://unpkg.com/lucide-static@0.321.0/icons/phone-off.svg"
    }
};
(function (d, t) {
    var g = document.createElement(t);
    var s = d.getElementsByTagName(t)[0];
    g.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
    g.defer = true;
    g.async = true;
    s.parentNode.insertBefore(g, s);
    g.onload = function () {
        vapiInstance = window.vapiSDK.run({
            apiKey: apiKey,
            assistant: assistant,
            config: buttonConfig
        });
    };
})(document, "script");
</script>

<div class="footer">GoStar Digital LLC, Puerto Rico</div>
</body>
</html>
